previews:
  generation: automatic

services:
  - type: web
    name: django-ai-chat
    env: python
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn healthcare.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: healthcare.settings
