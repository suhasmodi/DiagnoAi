previews:
  generation: automatic

services:
  - type: web
    name: ai-chat-service          
    runtime: python
    branch: main                   
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn ai_chat:app
    envVars:
      - key: PORT
        value: "10000"             
    healthCheckPath: /health       
